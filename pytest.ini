[pytest]
markers =
    fast_contract: fast unit/contract checks for the current report pipeline contract
    pipeline_contract: stage-to-stage contract checks for report generation without real network/LLM calls
    slow_integration: slower integration tests that may run larger writer/reformatter paths
    legacy_clean_contract: tests that assert the previous clean-gate delivery contract
addopts = -m "not slow_integration and not legacy_clean_contract"
